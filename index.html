<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<title>UZA App</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff;}
.container {padding:15px;}
.card {background:#1e293b;padding:15px;border-radius:15px;margin-bottom:10px;}
input, button {width:100%;padding:12px;border-radius:10px;border:none;margin-top:8px;}
input {background:#334155;color:white;}
button {background:#22c55e;color:white;font-weight:bold;}
.stats {display:flex;gap:10px;}
.stat {flex:1;background:#1e293b;padding:10px;border-radius:10px;text-align:center;}

#splash {
position:fixed;top:0;left:0;width:100%;height:100%;
background:#0f172a;display:flex;flex-direction:column;
justify-content:center;align-items:center;z-index:9999;
}

.logo {
font-size:40px;font-weight:bold;
background:linear-gradient(45deg,#22c55e,#3b82f6);
-webkit-background-clip:text;color:transparent;
}

.loader {
width:40px;height:40px;border:4px solid #334155;
border-top:4px solid #22c55e;border-radius:50%;
margin-top:20px;animation:spin 1s linear infinite;
}

@keyframes spin {100% {transform:rotate(360deg);}}

button:active {transform:scale(0.95);}
.bounce {animation:bounce 0.4s;}
@keyframes bounce {
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">UZA</div>
  <div class="loader"></div>
</div>

<div class="container">

<h2>📊 Dashboard</h2>

<div class="stats">
<div class="stat">🆕<br><span id="newCount">0</span></div>
<div class="stat">✅<br><span id="doneCount">0</span></div>
<div class="stat">💰<br><span id="sum">0</span></div>
</div>

<h2>📝 New Request</h2>

<input type="tel" id="inn" placeholder="ИНН (9 цифр)" maxlength="9">
<button onclick="search()">🔍 Найти</button>

<div id="client"></div>

<input type="tel" id="income" placeholder="Доход">
<input type="month" id="month">

<button onclick="send()">🚀 Отправить</button>

<div id="status"></div>

<h2>📋 Последние</h2>
<div id="list"></div>

</div>

<!-- SOUND -->
<audio id="successSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5b6a2b3.mp3"></audio>
<audio id="errorSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3d8f6b0a5d.mp3"></audio>
<audio id="searchSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c1d9a6c2c.mp3"></audio>

<script>

const API_URL = "ВСТАВЬ_СЮДА_URL";

let clientData = null;

function vibrate(type){
if(!navigator.vibrate) return;
if(type==="success") navigator.vibrate([100,50,100]);
if(type==="error") navigator.vibrate([300]);
if(type==="search") navigator.vibrate([50]);
}

// ===== SEARCH =====
function search(){
let btn = event.target;
btn.classList.add("bounce");
setTimeout(()=>btn.classList.remove("bounce"),400);

let inn = document.getElementById("inn").value;

if(inn.length!==9){
errorSound.play();
vibrate("error");
alert("ИНН должен быть 9 цифр");
return;
}

searchSound.play();
vibrate("search");

fetch(API_URL+"?inn="+inn)
.then(r=>r.json())
.then(data=>{
if(data.found){
clientData=data;
successSound.play();
vibrate("success");

document.getElementById("client").innerHTML=
`<div class="card">
👤 ${data.fio}<br>
📍 ${data.address}<br>
📞 ${data.phone}
</div>`;
}else{
errorSound.play();
vibrate("error");
alert("Не найдено");
}
});
}

// ===== SEND =====
function send(){
let btn = event.target;
btn.classList.add("bounce");
setTimeout(()=>btn.classList.remove("bounce"),400);

if(!clientData){
errorSound.play();
vibrate("error");
alert("Сначала найдите клиента");
return;
}

status.innerHTML="⏳ Отправка...";

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
inn:inn.value,
income:income.value,
fio:clientData.fio,
address:clientData.address,
phone:clientData.phone,
employees:clientData.employees
})
})
.then(r=>{
if(r.ok){
successSound.play();
vibrate("success");
status.innerHTML="✅ Готово!";
loadDashboard();
}else{
errorSound.play();
vibrate("error");
}
});
}

// ===== DASHBOARD =====
function loadDashboard(){
fetch(API_URL+"?stats=true")
.then(r=>r.json())
.then(d=>{
newCount.innerText=d.new;
doneCount.innerText=d.done;
sum.innerText=d.sum;

let html="";
d.list.forEach(i=>{
html+=`<div class="card">
${i.fio}<br>${i.income}<br>${i.status}
</div>`;
});
list.innerHTML=html;
});
}

loadDashboard();

// SPLASH
window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},2000);
}

// SERVICE WORKER
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
