<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UZA App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:#fff;
}

#appVersion {
  position:fixed;
  top:8px;
  right:12px;
  font-size:12px;
  opacity:0.6;
}

.container {padding:15px;max-width:480px;margin:auto;}

input, button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:16px;
}

input {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

button {
  background: linear-gradient(45deg,#22c55e,#16a34a);
  color:white;
  font-weight:bold;
  opacity:0.5;
}

button.active {opacity:1;}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #334155;
  border-top:4px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin {100%{transform:rotate(360deg);}}

#overlay, #successPopup, #welcome {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
  z-index:9999;
}

.popupBox {
  background:#22c55e;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.innStatus {margin-top:5px;}
.success {color:#22c55e;}
.error {color:#ef4444;}

#pull {
  text-align:center;
  opacity:0.5;
  transform:translateY(-40px);
}
</style>
</head>

<body>

<div id="appVersion"></div>

<!-- Приветствие -->
<div id="welcome">
  <div class="popupBox">
    👋<br><br>
    Добро пожаловать на портал отправки заявок!
  </div>
</div>

<div class="container">

<div id="pull">⬇ Потяните вниз</div>

<h2>Портал подачи заявок</h2>

<input type="tel" id="inn" placeholder="Введите ИНН" maxlength="9">
<div id="innStatus"></div>

<div id="loader" style="display:none;text-align:center;">
  <div class="spinner"></div>
  <div>Поиск...</div>
</div>

<div id="client"></div>

<input type="tel" id="income" placeholder="Введите доход">

<label>📅 Выберите месяц</label>
<input type="month" id="month">

<button id="sendBtn" onclick="send()" disabled>🚀 Отправить</button>

</div>

<!-- Отправка -->
<div id="overlay">
  <div>
    <div class="spinner"></div>
    <div style="text-align:center;margin-top:10px;">Отправка...</div>
  </div>
</div>

<!-- Успех -->
<div id="successPopup">
  <div class="popupBox">
    🎉<br><br>Заявка успешно отправлена!
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// ===== ВЕРСИЯ =====
const APP_VERSION = "1.2";
appVersion.innerText = "v" + APP_VERSION;
console.log("🚀 UZA App version:", APP_VERSION);

// ===== API =====
const API_URL = "https://script.google.com/macros/s/AKfycbwUQ3EPlYjs2jqoEG4e4dDnXhb5AEbd5dLh9f_cWYsBVV8OFZMtn-kKn-KweiH3UfM1/exec";

let clientData=null;

// ===== Приветствие =====
window.onload = ()=>{
  welcome.style.display="flex";
  setTimeout(()=>welcome.style.display="none",2000);
}

// ===== Месяц по умолчанию =====
document.addEventListener("DOMContentLoaded",()=>{
  const now=new Date();
  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  month.value = prev.getFullYear()+"-"+String(prev.getMonth()+1).padStart(2,'0');
});

// ===== Поиск =====
inn.addEventListener("input",()=>{
  inn.value = inn.value.replace(/\D/g,'');

  if(inn.value.length===9){
    loader.style.display="block";

    fetch(API_URL+"?inn="+inn.value)
    .then(r=>r.json())
    .then(data=>{
      loader.style.display="none";

      if(data.found){
        clientData=data;
        innStatus.innerHTML="✅ Найден клиент";
        innStatus.className="success";

        client.innerHTML=`
        <div class="card">
          <b>${data.fio}</b><br>
          ${data.address}<br>
          📞 ${data.phone}
        </div>`;
      } else {
        clientData=null;
        innStatus.innerHTML="❌ Не найдено";
        innStatus.className="error";
        client.innerHTML="";
      }

      checkButton();
    });
  }
});

// ===== Проверка кнопки =====
function checkButton(){
  if(clientData && income.value && month.value){
    sendBtn.classList.add("active");
    sendBtn.disabled=false;
  } else {
    sendBtn.classList.remove("active");
    sendBtn.disabled=true;
  }
}

income.addEventListener("input",checkButton);
month.addEventListener("change",checkButton);

// ===== Отправка =====
function send(){
  if(!clientData) return;

  overlay.style.display="flex";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      inn:inn.value,
      income:income.value,
      month:month.value
    })
  })
  .then(()=>{
    overlay.style.display="none";

    successPopup.style.display="flex";
    confetti({particleCount:120,spread:70});

    setTimeout(()=>successPopup.style.display="none",2500);

    inn.value="";
    income.value="";
    client.innerHTML="";
    clientData=null;

    checkButton();
  });
}

// ===== Pull to refresh =====
let startY=0;

document.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
  let endY=e.changedTouches[0].clientY;

  if(endY-startY>100){
    location.reload();
  }
});

// ===== PWA =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
