<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>UZA App</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff;overflow-x:hidden;}
.container {padding:15px;max-width:480px;margin:auto;}

input, button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:16px;
}

input {background:#334155;color:white;}
button {background:#22c55e;color:white;font-weight:bold;}

.card {background:#1e293b;padding:15px;border-radius:15px;margin-top:10px;}

.loader {text-align:center;margin-top:10px;}

#appVersion {position:fixed;top:8px;right:12px;font-size:11px;opacity:0.5;}

#sendingOverlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);display:none;
justify-content:center;align-items:center;z-index:9999;
}

.spinner {
width:50px;height:50px;border:5px solid #334155;
border-top:5px solid #22c55e;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin {100%{transform:rotate(360deg);}}

/* popup */
#successPopup {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);display:none;
justify-content:center;align-items:center;
z-index:9999;
}

.popupBox {
background:#22c55e;padding:20px;border-radius:15px;
text-align:center;font-size:16px;
}

/* splash */
#splashScreen {
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#0f172a;
display:flex;justify-content:center;align-items:center;
z-index:99999;
transition:opacity 0.6s;
}

#splashScreen.hide {opacity:0;}

.logo {
font-size:42px;
font-weight:bold;
background:linear-gradient(45deg,#22c55e,#3b82f6);
-webkit-background-clip:text;
color:transparent;
}

.loaderCircle {
width:40px;height:40px;
border:4px solid #334155;
border-top:4px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
margin-top:20px;
}

/* pull */
#pullRefresh {
text-align:center;
font-size:13px;
opacity:0.6;
transform:translateY(-40px);
transition:0.3s;
}
</style>

</head>

<body>

<!-- SPLASH -->
<div id="splashScreen">
  <div>
    <div class="logo">UZA</div>
    <div style="margin-top:10px;">Добро пожаловать</div>
    <div class="loaderCircle"></div>
  </div>
</div>

<audio id="startSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c4e9c4f57.mp3"></audio>

<div id="appVersion">v1.3</div>

<div class="container">

<div id="pullRefresh">⬇ Потяните вниз</div>

<h2>📝 Портал подачи заявок</h2>

<input type="tel" id="inn" placeholder="Введите свой ИНН" maxlength="9">

<div id="searchLoader" class="loader" style="display:none;">🔍 Поиск...</div>
<div id="client"></div>

<input type="tel" id="income" placeholder="Введите доход">

<label>📅 Выберите месяц</label>
<input type="month" id="month">

<button onclick="send()">🚀 Отправить</button>

</div>

<div id="sendingOverlay">
<div>
<div class="spinner"></div>
<div style="margin-top:10px;">Отправка...</div>
</div>
</div>

<div id="successPopup">
<div class="popupBox">
🎉<br><br>Ваша заявка успешно отправлена!
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwUQ3EPlYjs2jqoEG4e4dDnXhb5AEbd5dLh9f_cWYsBVV8OFZMtn-kKn-KweiH3UfM1/exec";

let clientData = null;

// splash
window.addEventListener("load",()=>{
  setTimeout(()=>{startSound.play().catch(()=>{});},300);
  setTimeout(()=>{splashScreen.classList.add("hide");},1800);
  setTimeout(()=>{splashScreen.style.display="none";},2500);
});

// месяц
document.addEventListener("DOMContentLoaded",()=>{
  const m=month;
  const now=new Date();

  m.max = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0');

  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  m.value = prev.getFullYear()+"-"+String(prev.getMonth()+1).padStart(2,'0');
});

// поиск
inn.addEventListener("input",()=>{
  if(inn.value.length===9) searchAuto(inn.value);
});

function searchAuto(val){
  searchLoader.style.display="block";
  fetch(API_URL+"?inn="+val)
  .then(r=>r.json())
  .then(data=>{
    searchLoader.style.display="none";
    if(data.found){
      clientData=data;
      client.innerHTML=`<div class="card">${data.fio}<br>${data.address}<br>${data.phone}</div>`;
    } else {
      client.innerHTML="❌ Не найдено";
      clientData=null;
    }
  });
}

// вибрация
function vibrate(){
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

// отправка
function send(){

  if(!clientData){alert("Введите ИНН");return;}

  sendingOverlay.style.display="flex";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      inn:inn.value,
      income:income.value,
      month:month.value,
      fio:clientData.fio,
      address:clientData.address,
      phone:clientData.phone,
      employee_fio: clientData.employee_fio,
      employee_inn: clientData.employee_inn,
      employee_sin: clientData.employee_sin,
      employee_salary: clientData.employee_salary,
      employee_date: clientData.employee_date
    })
  })
  .then(r=>r.text())
  .then(()=>{
    sendingOverlay.style.display="none";
    confetti({particleCount:120,spread:70});
    vibrate();
    successPopup.style.display="flex";
    setTimeout(()=>successPopup.style.display="none",2500);

    inn.value="";
    income.value="";
    client.innerHTML="";
    clientData=null;
  });

}

// pull refresh
let startY=0,currentY=0,pulling=false;

document.addEventListener("touchstart",e=>{
  if(window.scrollY===0){
    startY=e.touches[0].clientY;
    pulling=true;
  }
});

document.addEventListener("touchmove",e=>{
  if(!pulling)return;
  currentY=e.touches[0].clientY;
  let diff=currentY-startY;

  if(diff>80){
    pullRefresh.innerHTML="🔄 Отпустите";
  }
});

document.addEventListener("touchend",()=>{
  if(!pulling)return;
  if(currentY-startY>80) location.reload();
  pulling=false;
});

</script>

</body>
</html>
