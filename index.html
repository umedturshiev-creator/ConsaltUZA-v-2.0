<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>UZA App</title>

<style>

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, Arial;
  background:#0f172a;
  color:#fff;
}

/* контейнер */
.container {
  padding:16px;
  max-width:480px;
  margin:auto;
}

/* заголовок */
h2 {
  font-size:20px;
  margin-bottom:10px;
}

/* поля */
input, button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:16px;
}

/* input */
input {
  background:#334155;
  color:white;
}

/* кнопка */
button {
  background:#22c55e;
  color:white;
  font-weight:bold;
}

/* карточка */
.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  font-size:14px;
}

/* loader */
.loader {
  text-align:center;
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

/* версия */
#appVersion {
  position:fixed;
  top:8px;
  right:12px;
  font-size:11px;
  opacity:0.5;
}

/* overlay */
#sendingOverlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* спиннер */
.spinner {
  width:50px;
  height:50px;
  border:5px solid #334155;
  border-top:5px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% {transform:rotate(360deg);}
}

/* popup */
#successPopup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popupBox {
  background:#22c55e;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-size:16px;
}

/* мобильные отступы */
@media (max-width:400px){
  input, button {padding:12px;font-size:15px;}
}

</style>
</head>

<body>

<div id="appVersion">v1.1</div>

<div class="container">

<h2>📝 Новая заявка</h2>

<input 
type="tel" 
id="inn" 
placeholder="Введите свой ИНН"
maxlength="9"
inputmode="numeric"
pattern="[0-9]*"
>

<div id="searchLoader" class="loader" style="display:none;">
🔍 Поиск данных...
</div>

<div id="client"></div>

<input 
type="tel" 
id="income" 
placeholder="Введите месячный доход"
inputmode="numeric"
>

<input type="month" id="month">

<button onclick="send()">🚀 Отправить заявку</button>

</div>

<!-- overlay -->
<div id="sendingOverlay">
<div>
<div class="spinner"></div>
<div style="margin-top:10px;text-align:center;">Отправка...</div>
</div>
</div>

<!-- popup -->
<div id="successPopup">
<div class="popupBox">
🎉<br><br>Ваша заявка успешно отправлена!
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby1HOova0eIURZoWy0ZgUp0oxca-UvsPuycy3VL3IlZAZqIjEo5z1Pcq13jrcwY2FYK/exec";

let clientData = null;

// автопоиск
inn.addEventListener("input", function(){

  if(this.value.length === 9){
    searchAuto(this.value);
  } else {
    client.innerHTML="";
  }

});

// поиск
function searchAuto(innValue){

  searchLoader.style.display="block";
  client.innerHTML="";

  fetch(API_URL + "?inn=" + innValue)
  .then(res=>res.json())
  .then(data=>{

    searchLoader.style.display="none";

    if(data.found){
      clientData = data;

      client.innerHTML = `
      <div class="card">
      👤 ${data.fio}<br>
      📍 ${data.address}<br>
      📞 ${data.phone}
      </div>`;
    } else {
      clientData = null;
      client.innerHTML="<div style='color:red'>❌ Не найдено</div>";
    }

  });

}

// отправка
function send(){

  if(!clientData){alert("Введите ИНН");return;}
  if(!income.value){alert("Введите доход");return;}
  if(!month.value){alert("Выберите месяц");return;}

  sendingOverlay.style.display="flex";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      inn:inn.value,
      income:income.value,
      month:month.value,

      fio:clientData.fio,
      address:clientData.address,
      phone:clientData.phone,

      employee_fio: clientData.employee_fio,
      employee_inn: clientData.employee_inn,
      employee_sin: clientData.employee_sin,
      employee_salary: clientData.employee_salary,
      employee_date: clientData.employee_date
    })
  })
  .then(r=>r.text())
  .then(()=>{

    sendingOverlay.style.display="none";

    confetti({particleCount:120,spread:70});

    if(navigator.vibrate){
      navigator.vibrate([200,100,200]);
    }

    successPopup.style.display="flex";

    setTimeout(()=>{
      successPopup.style.display="none";
    },2500);

    inn.value="";
    income.value="";
    month.value="";
    client.innerHTML="";
    clientData=null;

  })
  .catch(()=>{
    sendingOverlay.style.display="none";
    alert("Ошибка");
  });

}

</script>

</body>
</html>
