<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UZA App</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  color: #fff;
  background:
    radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
    radial-gradient(circle at 80% 80%, #065f46, transparent),
    #0f172a;
}

#splashScreen {
  position: fixed;
  inset: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9998;
}

.splash-logo {
  width: 80px;
  margin-bottom: 10px;
}

.loader {
  width: 40px;
  height: 40px;
  border: 4px solid #334155;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 10px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.container { padding: 15px; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.logo { width: 40px; }

input, select {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  margin-top: 12px;
  font-size: 18px;
  background: #1e293b;
  color: white;
  border: none;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  margin-top: 15px;
  font-size: 18px;
  background: #22c55e;
  color: white;
  border: none;
  cursor: pointer;
}

button:disabled {
  background: #475569;
  cursor: not-allowed;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  line-height: 1.6;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.searchSpinner {
  width: 28px;
  height: 28px;
  border: 3px solid #334155;
  border-top: 3px solid #22c55e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 15px auto;
}

.progressBox {
  height: 6px;
  background: #1e293b;
  margin: 10px;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: #22c55e;
}

.langSwitch {
  display: flex;
  background: #1e293b;
  border-radius: 20px;
  overflow: hidden;
  width: 120px;
  margin: 10px;
}

.langBtn {
  flex: 1;
  text-align: center;
  padding: 8px;
  cursor: pointer;
}

.langBtn.active { background: #22c55e; }

#sendingOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.sendBox {
  text-align: center;
  width: 80%;
  max-width: 300px;
}

.progressLine {
  height: 8px;
  background: #334155;
  border-radius: 10px;
  margin-top: 10px;
}

#progressFill {
  height: 100%;
  width: 0;
  background: #22c55e;
}

#loginScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.97);
  z-index: 9997;
  padding-top: 70px;
}

#adminPanel { display: none; }

#topLoginBtn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(30,41,59,0.9);
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  z-index: 9996;
  border: 1px solid rgba(255,255,255,0.1);
}

.statusSaved {
  color: #22c55e;
  font-size: 13px;
  margin-top: 8px;
}

.statusError {
  color: #ef4444;
  font-size: 13px;
  margin-top: 8px;
}

.dashboardGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 8px;
  margin-top: 10px;
}

.dashboardGrid .card {
  padding: 10px 8px;
  border-radius: 12px;
  text-align: center;
}

.dashboardGrid b {
  font-size: 12px;
  color: #94a3b8;
}

.dashboardGrid span {
  display: block;
  margin-top: 4px;
  font-size: 18px;
  font-weight: 700;
}

.dashboardGrid .card {
  text-align: center;
  margin-top: 0;
}

.dashboardGrid span {
  display: inline-block;
  margin-top: 8px;
  font-size: 18px;
  font-weight: bold;
}

.adminActions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.adminActions button { margin-top: 10px; }

#toggleFormIcon {
  position: fixed;
  top: 60px;
  right: 15px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(30,41,59,0.95);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  cursor: pointer;
  z-index: 9996;
  font-size: 19px;
  transition: 0.2s;
}

#toggleFormIcon:hover { background: rgba(34,197,94,0.9); }

.searchMark {
  background: #fde047;
  color: #0f172a;
  padding: 1px 3px;
  border-radius: 5px;
  font-weight: 800;
}

.applicationCard {
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 10px 25px rgba(0,0,0,0.18);
}

.applicationMain {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}

.applicationName {
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 4px;
}

.statusBadge {
  white-space: nowrap;
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: #bbf7d0;
  padding: 5px 9px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.appDetails {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px 12px;
  font-size: 14px;
}

.appDetails div {
  color: #e2e8f0;
}

.appDetails small {
  color: #94a3b8;
  display: block;
  font-size: 11px;
}

.statusSelectWrap { margin-top: 12px; }

@media (max-width: 700px) {
  body {
    background: #0f172a;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .container {
    padding: 12px;
    max-width: 520px;
    margin: 0 auto;
  }

  #topLoginBtn {
    top: 10px;
    right: 10px;
    font-size: 13px;
    padding: 7px 10px;
  }

  #toggleFormIcon {
    top: 54px;
    right: 10px;
    width: 40px;
    height: 40px;
  }

  .langSwitch { margin: 8px 0 10px; }
  .progressBox { margin: 8px 0; }
  .header { padding: 12px 0; }

  input, select, button {
    font-size: 16px;
    padding: 14px;
    border-radius: 16px;
  }

  .card {
    border-radius: 18px;
    padding: 14px;
  }

  .dashboardGrid {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 6px;
    scroll-snap-type: x mandatory;
  }

  .dashboardGrid .card {
    min-width: 135px;
    scroll-snap-align: start;
  }

  .dashboardGrid span { font-size: 20px; }

  .adminActions {
    grid-template-columns: 1fr;
    gap: 0;
  }

  #applicationSearch {
    position: sticky;
    top: 8px;
    z-index: 20;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  .applicationMain { display: block; }
  .statusBadge { display: inline-block; margin-top: 6px; }
  .appDetails { grid-template-columns: 1fr; }
}

@media print {
  body { background: #fff; color: #000; }
  #topLoginBtn, #loginScreen, .langSwitch, .progressBox, .header, #inn, #income, #monthLabel, #month, #submitBtn, #refreshBtn, #logoutBtn, #applicationSearch, #exportExcelBtn, #exportPdfBtn, #toggleFormIcon, select, #sendingOverlay, #splashScreen { display:none !important; }
  #adminPanel { display:block !important; }
  .card { background:#fff; color:#000; border:1px solid #ccc; box-shadow:none; }
}

.statusBadge {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  display: inline-block;
}

/* Новый */
.status-new {
  background: rgba(148,163,184,0.2);
  color: #cbd5f5;
  border: 1px solid rgba(148,163,184,0.4);
}

/* В процессе */
.status-process {
  background: rgba(250,204,21,0.15);
  color: #fde047;
  border: 1px solid rgba(250,204,21,0.4);
}

/* Решен */
.status-done {
  background: rgba(34,197,94,0.15);
  color: #bbf7d0;
  border: 1px solid rgba(34,197,94,0.4);
}

/* Отменен */
.status-cancel {
  background: rgba(239,68,68,0.15);
  color: #fecaca;
  border: 1px solid rgba(239,68,68,0.4);
}

.dashCard {
  cursor: pointer;
  transition: 0.2s;
}

.dashCard:hover {
  transform: translateY(-2px);
  background: #334155;
}

.dashCard.active {
  border: 1px solid #22c55e;
  box-shadow: 0 0 15px rgba(34,197,94,0.25);
}
  
</style>
</head>

<body>

<div id="splashScreen">
  <div style="text-align:center">
    <img src="logo.png" class="splash-logo">
    <h2 id="splashTitle">Добро пожаловать</h2>
    <div id="splashSub">в Портал подачи заявок</div>
    <div class="loader"></div>
  </div>
</div>

<div id="topLoginBtn" onclick="showLogin()">🔐 Вход</div>

<div id="loginScreen" class="container">
  <div class="card">
    <h2 id="loginTitleText">🔐 Вход в программу</h2>
    <input id="loginInput" placeholder="Логин">
    <input id="passwordInput" type="password" placeholder="Пароль">
    <button id="loginBtn" onclick="login()">Войти</button>
    <button id="closeLoginBtn" onclick="hideLogin()" style="background:#475569;">Закрыть</button>
    <div id="loginError" style="color:#ef4444;margin-top:10px;"></div>
  </div>
</div>

<div class="container" id="appScreen">
  <div class="langSwitch">
    <div class="langBtn" data-lang="ru">RU</div>
    <div class="langBtn" data-lang="tj">TJ</div>
  </div>

  <div class="progressBox"><div id="progressBar"></div></div>

  <div id="requestFormBlock">

  <div class="header">
    <div>
      <span id="title">📝 Портал подачи заявок</span><br>
      <small id="appVersion" style="color:#94a3b8;font-size:12px;">v1.3.0</small>
    </div>
    <img src="logo.png" class="logo">
  </div>

  <input id="inn" inputmode="numeric" maxlength="9" placeholder="Введите ИНН">
  <div id="searchStatus"></div>
  <div id="client"></div>

  <input id="income" inputmode="numeric" placeholder="Введите доход">

  <label id="monthLabel">📅 Выберите месяц</label>
  <input type="month" id="month">

  <button id="submitBtn" onclick="send()" disabled>🚀 Отправить</button>

  </div>

  <div id="adminPanel">
    <button id="refreshBtn" onclick="loadApplications()">📋 Обновить список заявок</button>
    <div id="toggleFormIcon" onclick="toggleRequestForm()" title="Показать / скрыть форму заявки">📝</div>
    <button id="logoutBtn" onclick="logout()" style="background:#ef4444;">Выйти</button>

    <h3 id="applicationsTitle">📋 Список заявок</h3>

    <div id="adminDashboard" class="dashboardGrid">
<div class="card dashCard" onclick="setDashboardFilter('today')">
  <b id="dashTodayLabel">Сегодня</b><br><span id="dashToday">0</span>
</div>

<div class="card dashCard" onclick="setDashboardFilter('all')">
  <b id="dashTotalLabel">Всего</b><br><span id="dashTotal">0</span>
</div>

<div class="card dashCard" onclick="setDashboardFilter('done')">
  <b id="dashDoneLabel">Решено</b><br><span id="dashDone">0</span>
</div>

<div class="card dashCard" onclick="setDashboardFilter('unresolved')">
  <b id="dashUnresolvedLabel">Нерешенные</b><br><span id="dashUnresolved">0</span>
</div>

<div class="card dashCard" onclick="setDashboardFilter('cancelled')">
  <b id="dashCancelledLabel">Отмененные</b><br><span id="dashCancelled">0</span>
</div>

<div class="card dashCard" onclick="setDashboardFilter('all')">
  <b id="dashSumLabel">Сумма</b><br><span id="dashSum">0</span>
</div>
    </div>

    <input id="applicationSearch" placeholder="Поиск по ИНН / ФИО" oninput="filterApplications()">

    <div class="adminActions">
      <button id="exportExcelBtn" onclick="exportExcel()">📊 Экспорт Excel</button>
      <button id="exportPdfBtn" onclick="exportPdf()" style="background:#475569;">📄 Экспорт PDF</button>
    </div>

    <div id="applicationsList"></div>
  </div>
</div>

<div id="sendingOverlay">
  <div class="sendBox">
    <div id="progressText">0%</div>
    <div class="progressLine"><div id="progressFill"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw41gd9JDsKlS3b52J2KykanB_7nXtu22Ql52dh1XguGuRCJhWz7wHQLz0D5jg_ZETu/exec";
const APP_VERSION = "1.3.1";

const translations = {
  ru: {
    title: "📝 Портал подачи заявок",
    inn: "Введите ИНН",
    income: "Введите доход",
    month: "Выберите месяц (Автоматический выбран прошлый месяц)",
    send: "🚀 Отправить",
    splash: "Добро пожаловать",
    sub: "в Портал подачи заявок",
    loginTitle: "🔐 Вход в программу",
    login: "Логин",
    password: "Пароль",
    enter: "Вход",
    close: "Закрыть",
    refresh: "📋 Обновить список заявок",
    logout: "Выйти",
    applications: "📋 Список заявок",
    loginEmpty: "Введите логин и пароль",
    loginError: "Ошибка входа",
    connectionError: "Ошибка подключения",
    noAccess: "Нет доступа",
    noData: "Заявок пока нет",
    loadError: "Ошибка загрузки заявок",
    statusError: "Ошибка изменения статуса",
    saved: "Сохранено",
    loginLoading: "Вход выполняется...",
    searchApplications: "Поиск по ИНН / ФИО",
    dashboardToday: "Сегодня",
    dashboardSum: "Сумма",
    dashboardDone: "Решено",
    exportExcel: "📊 Экспорт Excel",
    exportPdf: "📄 Экспорт PDF",
    confirmStatus: "Вы уверены, что хотите изменить статус?",
    toggleForm: "📝 Показать / скрыть форму заявки",
    dashboardTotal: "Всего",
    dashboardUnresolved: "Нерешенные",
    date: "Дата",
    fio: "ФИО",
    address: "Адрес",
    phone: "Телефон",
    status: "Статус",
    employee: "Сотрудник",
    employeeInn: "ИНН сотрудника",
    employeeSin: "СИН сотрудника",
    employeeSalary: "ЗП сотрудника",
    employeeDate: "Дата принятия",
    status_new: "Новый",
    status_process: "В процессе",
    status_done: "Решен",
    status_cancel: "Отменен",
    dashboardCancelled: "Отмененные",
  },
  tj: {
    title: "📝 Портали дархостҳо",
    inn: "РМА-ро ворид кунед",
    income: "Даромадро ворид кунед",
    month: "Моҳро интихоб кунед (Моҳи гузашта худкор интихоб шудааст)",
    send: "🚀 Ирсол",
    splash: "Хуш омадед",
    sub: "ба портал",
    loginTitle: "🔐 Вуруд ба система",
    login: "Логин",
    password: "Рамз",
    enter: "Вуруд",
    close: "Пӯшидан",
    refresh: "📋 Навсозии рӯйхат",
    logout: "Баромадан",
    applications: "📋 Рӯйхати дархостҳо",
    loginEmpty: "Логин ва рамзро ворид кунед",
    loginError: "Хатои воридшавӣ",
    connectionError: "Хатои пайвастшавӣ",
    noAccess: "Дастрасӣ нест",
    noData: "Ҳоло дархост нест",
    loadError: "Хатои боркунии дархостҳо",
    statusError: "Хатои иваз кардани ҳолат",
    saved: "Сабт шуд",
    loginLoading: "Вуруд иҷро шуда истодааст...",
    searchApplications: "Ҷустуҷӯ аз рӯи РМА / Ному насаб",
    dashboardToday: "Имрӯз",
    dashboardSum: "Маблағ",
    dashboardDone: "Ҳал шуд",
    exportExcel: "📊 Содирот Excel",
    exportPdf: "📄 Содирот PDF",
    confirmStatus: "Шумо мутмаин ҳастед, ки ҳолатро иваз мекунед?",
    toggleForm: "📝 Нишон / пинҳон кардани шакли дархост",
    dashboardTotal: "Ҳамагӣ",
    dashboardUnresolved: "Ҳалнашуда",
    date: "Сана",
    fio: "Ному насаб",
    address: "Суроға",
    phone: "Телефон",
    status: "Ҳолат",
    employee: "Корманд",
    employeeInn: "РМА-и корманд",
    employeeSin: "СИН-и корманд",
    employeeSalary: "Музди корманд",
    employeeDate: "Санаи қабул",
    status_new: "Нав",
    status_process: "Дар раванди кор",
    status_done: "Ҳал шуд",
    status_cancel: "Бекор шуд",
    dashboardCancelled: "Бекоршуда",
  }
};

let clientData = null;
let allApplications = [];
let dashboardFilter = "all";

function $(id) { return document.getElementById(id); }
function currentLang() { return localStorage.getItem("lang") || "ru"; }
function tr() { return translations[currentLang()] || translations.ru; }

function setText(id, text) {
  const el = $(id);
  if (el) el.innerText = text;
}

function checkProgramUpdate() {
  fetch(API_URL + "?action=version&t=" + Date.now())
    .then(r => r.json())
    .then(d => {
      if (!d.version) return;

      if (d.version !== APP_VERSION) {
        showUpdateBanner(d.version);
      }
    })
    .catch(() => {});
}

function showUpdateBanner(newVersion) {
  if (document.getElementById("updateBanner")) return;

  const banner = document.createElement("div");
  banner.id = "updateBanner";
  banner.innerHTML = `
    🔄 Доступна новая версия ${newVersion}
    <button onclick="forceUpdateProgram()">Обновить</button>
  `;

  banner.style.position = "fixed";
  banner.style.bottom = "15px";
  banner.style.left = "15px";
  banner.style.right = "15px";
  banner.style.background = "#22c55e";
  banner.style.color = "white";
  banner.style.padding = "14px";
  banner.style.borderRadius = "14px";
  banner.style.zIndex = "10000";
  banner.style.textAlign = "center";
  banner.style.fontWeight = "bold";
  banner.style.boxShadow = "0 10px 30px rgba(0,0,0,0.3)";

  document.body.appendChild(banner);
}

function forceUpdateProgram() {
  localStorage.setItem("lastAppUpdate", Date.now());
  window.location.reload(true);
}

function setPlaceholder(id, text) {
  const el = $(id);
  if (el) el.placeholder = text;
}

function normalizeStatus(status) {
  return String(status || "").toLowerCase().trim();
}

function isDoneStatus(status) {
  const s = normalizeStatus(status);
  return s === "решен" || s === "решён" || s === "ҳал шуд";
}

function isCancelledStatus(status) {
  const s = normalizeStatus(status);
  return s === "отменен" || s === "отменён" || s === "бекор шуд";
}

function isUnresolvedStatus(status) {
  return !isDoneStatus(status) && !isCancelledStatus(status);
}

function isTodayItem(item) {
  const today = new Date().toLocaleDateString();
  return String(item.date || "").includes(today);
}

function setDashboardFilter(filter) {
  dashboardFilter = filter;

  document.querySelectorAll(".dashCard").forEach(card => {
    card.classList.remove("active");
  });

  const activeMap = {
    today: "dashTodayLabel",
    all: "dashTotalLabel",
    done: "dashDoneLabel",
    unresolved: "dashUnresolvedLabel",
    cancelled: "dashCancelledLabel"
  };

  const labelId = activeMap[filter];
  if (labelId) {
    const label = document.getElementById(labelId);
    if (label) label.closest(".dashCard").classList.add("active");
  }

  filterApplications();
}

function setLang(lang) {
  const x = translations[lang] || translations.ru;
  setText("title", x.title);
  setPlaceholder("inn", x.inn);
  setPlaceholder("income", x.income);
  setText("monthLabel", "📅 " + x.month);
  setText("submitBtn", x.send);
  setText("splashTitle", x.splash);
  setText("splashSub", x.sub);
  setText("loginTitleText", x.loginTitle);
  setPlaceholder("loginInput", x.login);
  setPlaceholder("passwordInput", x.password);
  setText("loginBtn", x.enter);
  setText("closeLoginBtn", x.close);
  setText("topLoginBtn", "🔐 " + x.enter);
  setText("refreshBtn", x.refresh);
  setText("logoutBtn", x.logout);
  setText("applicationsTitle", x.applications);
  setPlaceholder("applicationSearch", x.searchApplications);
  setText("dashTodayLabel", x.dashboardToday);
  setText("dashSumLabel", x.dashboardSum);
  setText("dashDoneLabel", x.dashboardDone);
  setText("exportExcelBtn", x.exportExcel);
  setText("exportPdfBtn", x.exportPdf);
  setText("dashTotalLabel", x.dashboardTotal);
  setText("dashUnresolvedLabel", x.dashboardUnresolved);
  setText("dashCancelledLabel", x.dashboardCancelled);
  localStorage.setItem("lang", lang);
}

function translateStatus(status) {
  const x = tr();
  const s = String(status || "").toLowerCase().trim();

  if (s === "новый") return x.status_new;
  if (s === "в процессе") return x.status_process;
  if (s === "решен" || s === "решён") return x.status_done;
  if (s === "отменен") return x.status_cancel;

  return status; // fallback
}
  
function escapeHtml(value) {
  if (value === null || value === undefined) return "";
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getEmployeeFio(data) {
  return data.employeeFio || data.employee || data.sotrudnik || data.fio_sotrudnika || data.sotrudnikFio || data.employee_name || data.manager || data.sotrudnik_name || "";
}

function initApp() {
  setLang(currentLang());

  document.querySelectorAll(".langBtn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLang());
    btn.onclick = () => {
      document.querySelectorAll(".langBtn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      setLang(btn.dataset.lang);
      if ($("adminPanel").style.display !== "none") {
        renderApplications(getCurrentFilteredApplications());
        updateDashboard(getCurrentFilteredApplications());
      }
    };
  });

  const now = new Date();
  const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  $("month").value = `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, "0")}`;

  checkLogin();

  setTimeout(() => {
    $("splashScreen").style.display = "none";
  }, 1200);
}

window.addEventListener("load", initApp);

setTimeout(() => {
  const splash = $("splashScreen");
  if (splash) splash.style.display = "none";
}, 3000);

function validate() {
  $("submitBtn").disabled = !($("inn").value.length === 9 && $("income").value && $("month").value && clientData);
}

$("income").oninput = () => {
  $("income").value = $("income").value.replace(/\D/g, "");
  validate();
};

$("inn").oninput = () => {
  $("inn").value = $("inn").value.replace(/\D/g, "").slice(0, 9);
  clientData = null;
  $("client").innerHTML = "";
  $("searchStatus").innerHTML = "";
  validate();

  if ($("inn").value.length === 9) {
    $("searchStatus").innerHTML = '<div class="searchSpinner"></div>';

    fetch(API_URL + "?inn=" + encodeURIComponent($("inn").value))
      .then(r => r.json())
      .then(d => {
        $("searchStatus").innerHTML = "";

        if (d && d.found) {
          const employeeFio = getEmployeeFio(d);
          clientData = { ...d, employeeFio };
          $("searchStatus").innerHTML = `<div style="color:#22c55e;font-weight:bold;">✅ ИНН найден</div>`;
          $("client").innerHTML = `
            <div class="card">
              👤 <b>${escapeHtml(d.fio || "")}</b><br>
              📍 ${escapeHtml(d.address || "—")}<br>
              📞 ${escapeHtml(d.phone || "—")}
              ${employeeFio ? `<br>🧑‍💼 Сотрудник: <b>${escapeHtml(employeeFio)}</b>` : ""}
            </div>
          `;
        } else {
          $("searchStatus").innerHTML = `<div style="color:#ef4444;font-weight:bold;">❌ ИНН не найден</div>`;
        }
        validate();
      })
      .catch(() => {
        clientData = null;
        $("searchStatus").innerHTML = `<div style="color:#ef4444;font-weight:bold;">❌ Ошибка поиска</div>`;
        validate();
      });
  }
};

function startProgress() {
  let p = 0;
  return setInterval(() => {
    p += 10;
    if (p > 90) p = 90;
    $("progressFill").style.width = p + "%";
    $("progressText").innerText = p + "%";
  }, 300);
}

function send() {
  if (!clientData) return;
  $("sendingOverlay").style.display = "flex";
  $("progressFill").style.width = "0%";
  $("progressText").innerText = "0%";
  const progress = startProgress();
  const employeeFio = clientData.employeeFio || getEmployeeFio(clientData);

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      inn: $("inn").value,
      income: $("income").value,
      month: $("month").value,
      fio: clientData.fio || "",
      employeeFio: employeeFio || "",
      employee: employeeFio || "",
      sotrudnik: employeeFio || "",
      fio_sotrudnika: employeeFio || ""
    })
  })
  .then(r => r.text())
  .then(() => {
    clearInterval(progress);
    $("progressFill").style.width = "100%";
    $("progressText").innerText = "100%";
    setTimeout(() => {
      $("sendingOverlay").style.display = "none";
      if (typeof confetti === "function") confetti({ particleCount: 150, spread: 90 });
      $("inn").value = "";
      $("income").value = "";
      $("client").innerHTML = "";
      $("searchStatus").innerHTML = "";
      clientData = null;
      validate();
      if ($("adminPanel").style.display !== "none") loadApplications();
    }, 500);
  })
  .catch(() => {
    clearInterval(progress);
    $("sendingOverlay").style.display = "none";
    alert("Ошибка отправки");
  });
}

function toggleRequestForm() {
  const block = $("requestFormBlock");
  const icon = $("toggleFormIcon");
  if (!block) return;

  if (block.style.display === "none") {
    block.style.display = "block";
    if (icon) icon.innerText = "❌";
  } else {
    block.style.display = "none";
    if (icon) icon.innerText = "📝";
  }
}

function showLogin() {
  $("loginScreen").style.display = "block";
  $("loginError").innerText = "";
}

function hideLogin() {
  $("loginScreen").style.display = "none";
  $("loginError").innerText = "";
}

function login() {
  const userLogin = $("loginInput").value.trim();
  const password = $("passwordInput").value.trim();
  const x = tr();
  $("loginError").innerText = "";

  if (!userLogin || !password) {
    $("loginError").innerText = x.loginEmpty;
    return;
  }

  $("loginBtn").disabled = true;
  $("loginBtn").innerText = x.loginLoading;

  fetch(API_URL + "?action=login&login=" + encodeURIComponent(userLogin) + "&password=" + encodeURIComponent(password))
    .then(r => r.json())
    .then(d => {
      $("loginBtn").disabled = false;
      $("loginBtn").innerText = x.enter;

      if (d.success) {
        localStorage.setItem("authToken", d.token);
        localStorage.setItem("userName", d.name || userLogin);
        $("loginScreen").style.display = "none";
        $("topLoginBtn").style.display = "none";
        $("adminPanel").style.display = "block";
        if ($("requestFormBlock")) $("requestFormBlock").style.display = "none";
        loadApplications();
      } else {
        $("loginError").innerText = d.error || x.loginError;
      }
    })
    .catch(() => {
      $("loginBtn").disabled = false;
      $("loginBtn").innerText = x.enter;
      $("loginError").innerText = x.connectionError;
    });
}

function checkLogin() {
  const token = localStorage.getItem("authToken");
  if (token) {
    $("topLoginBtn").style.display = "none";
    $("adminPanel").style.display = "block";
    if ($("requestFormBlock")) $("requestFormBlock").style.display = "none";
    loadApplications();
  } else {
    $("topLoginBtn").style.display = "block";
    $("adminPanel").style.display = "none";
  }
}

function logout() {
  localStorage.removeItem("authToken");
  localStorage.removeItem("userName");
  $("topLoginBtn").style.display = "block";
  $("adminPanel").style.display = "none";
  if ($("requestFormBlock")) $("requestFormBlock").style.display = "block";
  $("applicationsList").innerHTML = "";
  allApplications = [];
}

function loadApplications() {
  const token = localStorage.getItem("authToken");
  const x = tr();

  $("applicationsList").innerHTML = '<div class="searchSpinner"></div>';

  fetch(API_URL + "?action=list&token=" + encodeURIComponent(token || ""))
    .then(r => r.text())
    .then(text => {
      let d;

      try {
        d = JSON.parse(text);
      } catch (e) {
        $("applicationsList").innerHTML =
          `<div style="color:#ef4444;font-weight:bold;">
            Ошибка ответа сервера:<br>${escapeHtml(text)}
          </div>`;
        return;
      }

      if (d.success === false) {
        $("applicationsList").innerHTML =
          `<div style="color:#ef4444;font-weight:bold;">
            ${escapeHtml(d.error || x.noAccess)}
          </div>`;
        return;
      }

      if (!d.items) {
        $("applicationsList").innerHTML =
          `<div style="color:#ef4444;font-weight:bold;">
            ${escapeHtml(x.loadError)}
          </div>`;
        return;
      }

      allApplications = d.items || [];

      const filtered = getCurrentFilteredApplications();
      updateDashboard(filtered);
      renderApplications(filtered);
    })
    .catch(error => {
      $("applicationsList").innerHTML =
        `<div style="color:#ef4444;font-weight:bold;">
          ${escapeHtml(x.loadError)}<br>${escapeHtml(error.message)}
        </div>`;
    });
}

function getSearchTokens() {
  const raw = ($("applicationSearch") ? $("applicationSearch").value : "").toLowerCase().trim();
  return raw.split(/\s+/).filter(Boolean);
}

function getCurrentFilteredApplications() {
  const tokens = getSearchTokens();

  return allApplications.filter(item => {
    const combined = [item.inn, item.fio]
      .map(v => String(v || "").toLowerCase())
      .join(" ");

    const searchOk = !tokens.length || tokens.every(token => combined.includes(token));

    let dashboardOk = true;

    if (dashboardFilter === "today") dashboardOk = isTodayItem(item);
    if (dashboardFilter === "done") dashboardOk = isDoneStatus(item.status);
    if (dashboardFilter === "unresolved") dashboardOk = isUnresolvedStatus(item.status);
    if (dashboardFilter === "cancelled") dashboardOk = isCancelledStatus(item.status);
    if (dashboardFilter === "all") dashboardOk = true;

    return searchOk && dashboardOk;
  });
}

function filterApplications() {
  const filtered = getCurrentFilteredApplications();
  renderApplications(filtered);
  updateDashboard(filtered);
}

function escapeRegExp(value) {
  return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function highlightMatch(value) {
  let safe = escapeHtml(value || "-");
  const tokens = getSearchTokens();
  if (!tokens.length) return safe;

  tokens.forEach(token => {
    if (!token) return;
    const regex = new RegExp("(" + escapeRegExp(token) + ")", "gi");
    safe = safe.replace(regex, '<span class="searchMark">$1</span>');
  });

  return safe;
}

function updateDashboard(items) {
  let todayCount = 0;
  let sum = 0;
  let done = 0;
  let total = items.length;
  let unresolved = 0;
  let cancelled = 0;

  const today = new Date().toLocaleDateString();

  items.forEach(item => {
    const itemDate = String(item.date || "");

    if (itemDate.includes(today)) {
      todayCount++;
    }

    sum += Number(String(item.income || "0").replace(/\D/g, "")) || 0;

    const status = String(item.status || "").toLowerCase().trim();

    if (status === "решен" || status === "решён" || status === "ҳал шуд") {
      done++;
    } else if (status === "отменен" || status === "бекор шуд") {
      cancelled++;
    } else {
      unresolved++;
    }
  });

  $("dashToday").innerText = todayCount;
  $("dashSum").innerText = sum;
  $("dashDone").innerText = done;
  $("dashTotal").innerText = total;
  $("dashUnresolved").innerText = unresolved;

  // 👇 новый блок (если добавишь в HTML)
  if ($("dashCancelled")) {
    $("dashCancelled").innerText = cancelled;
  }
}
  
function renderApplications(items) {
  const x = tr();

  if (!items.length) {
    $("applicationsList").innerHTML = `<div class="card">${escapeHtml(x.noData)}</div>`;
    return;
  }

  $("applicationsList").innerHTML = items.map(item => `
    <div class="card applicationCard">
      <div class="applicationMain">
        <div>
          <div class="applicationName">👤 ${highlightMatch(item.fio || "-")}</div>
<div>🆔 ИНН: <b>${highlightMatch(item.inn || "-")}</b></div>
        </div>

        <div class="statusBadge ${getStatusClass(item.status)}">
          ${escapeHtml(translateStatus(item.status))}
        </div>
      </div>

      <div class="appDetails">
        <div><small>${escapeHtml(x.date)}</small>📅 ${escapeHtml(item.date || "-")}</div>
        <div><small>${escapeHtml(x.income)}</small>💰 ${escapeHtml(item.income || "-")}</div>
        <div><small>${escapeHtml(x.phone)}</small>📞 ${escapeHtml(item.phone || "-")}</div>
        <div><small>${escapeHtml(x.address)}</small>📍 ${escapeHtml(item.address || "-")}</div>
        <div><small>${escapeHtml(x.employee)}</small>🧑‍💼 ${escapeHtml(item.employee || "-")}</div>
        <div><small>${escapeHtml(x.employeeInn)}</small>🆔 ${escapeHtml(item.employeeInn || "-")}</div>
        <div><small>${escapeHtml(x.employeeSin)}</small>🔢 ${escapeHtml(item.employeeSin || "-")}</div>
        <div><small>${escapeHtml(x.employeeSalary)}</small>💵 ${escapeHtml(item.employeeSalary || "-")}</div>
        <div><small>${escapeHtml(x.employeeDate)}</small>📆 ${escapeHtml(item.employeeDate || "-")}</div>
      </div>

      <div class="statusSelectWrap">
        📊 ${escapeHtml(x.status)}:
        <select onchange="changeStatus(${item.rowIndex}, this.value)">
          <option value="Новый" ${item.status === "Новый" ? "selected" : ""}>${escapeHtml(x.status_new)}</option>
          <option value="В процессе" ${item.status === "В процессе" ? "selected" : ""}>${escapeHtml(x.status_process)}</option>
          <option value="Решен" ${item.status === "Решен" ? "selected" : ""}>${escapeHtml(x.status_done)}</option>
          <option value="Отменен" ${item.status === "Отменен" ? "selected" : ""}>${escapeHtml(x.status_cancel)}</option>
        </select>
        <div id="status-message-${item.rowIndex}"></div>
      </div>
    </div>
  `).join("");
}

function changeStatus(rowIndex, status) {
  const token = localStorage.getItem("authToken");
  const x = tr();
  const msg = $("status-message-" + rowIndex);

  if (!confirm(x.confirmStatus)) {
    loadApplications();
    return;
  }

  if (msg) {
    msg.className = "statusSaved";
    msg.innerText = "...";
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "updateStatus",
      token: token,
      rowIndex: rowIndex,
      status: status
    })
  })
  .then(r => r.text())
  .then(res => {
    if (res === "ok") {
      if (msg) {
        msg.className = "statusSaved";
        msg.innerText = "✅ " + x.saved;
      }
      loadApplications();
    } else {
      if (msg) {
        msg.className = "statusError";
        msg.innerText = res || x.statusError;
      }
      loadApplications();
    }
  })
  .catch(() => {
    if (msg) {
      msg.className = "statusError";
      msg.innerText = x.statusError;
    }
    loadApplications();
  });
}

function exportExcel() {
  const x = tr();
  const rows = getCurrentFilteredApplications();
  let csv = `${x.date};ИНН;${x.income};${x.fio};${x.address};${x.phone};${x.status};${x.employee};${x.employeeInn};${x.employeeSin};${x.employeeSalary};${x.employeeDate}\n`;

  rows.forEach(item => {
    csv += [
      item.date,
      item.inn,
      item.income,
      item.fio,
      item.address,
      item.phone,
      item.status,
      item.employee,
      item.employeeInn,
      item.employeeSin,
      item.employeeSalary,
      item.employeeDate
    ].map(v => `"${String(v || "").replace(/"/g, '""')}"`).join(";") + "\n";
  });

  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "applications.csv";
  link.click();
  URL.revokeObjectURL(link.href);
}

function getStatusClass(status) {
  const s = String(status || "").toLowerCase().trim();

  if (s === "новый") return "status-new";
  if (s === "в процессе") return "status-process";
  if (s === "решен" || s === "решён" || s === "ҳал шуд") return "status-done";
  if (s === "отменен") return "status-cancel";

  return "";
}
