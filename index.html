<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<title>UZA App</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff;}
.container {padding:15px;}
input, button {width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;}
input {background:#334155;color:white;}
button {background:#22c55e;color:white;font-weight:bold;}

#appVersion {position:fixed;top:10px;right:15px;font-size:12px;opacity:0.6;}

#sendingOverlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);display:none;
justify-content:center;align-items:center;z-index:9999;
}
.spinner {
width:50px;height:50px;border:5px solid #334155;
border-top:5px solid #22c55e;border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin {100%{transform:rotate(360deg);}}
</style>
</head>

<body>

<div id="appVersion">v1.0</div>

<div class="container">
<h2>Новая заявка</h2>

<input type="tel" id="inn" placeholder="Введите свой ИНН" maxlength="9">
<input type="tel" id="income" placeholder="Введите свой месячный доход">
<button onclick="send()">Отправить</button>

<div id="status"></div>
</div>

<div id="sendingOverlay">
<div>
<div class="spinner"></div>
<div>Отправка данных...</div>
</div>
</div>

<script>
const API_URL = "PASTE_YOUR_URL";

function send(){
sendingOverlay.style.display="flex";

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
inn:inn.value,
income:income.value
})
})
.then(res=>{
sendingOverlay.style.display="none";
status.innerHTML = res.ok ? "✅ Успешно" : "❌ Ошибка";
})
.catch(()=>{
sendingOverlay.style.display="none";
status.innerHTML="❌ Ошибка сети";
});
}
</script>

</body>
</html>
