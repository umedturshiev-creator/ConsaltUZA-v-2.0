<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UZA App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color:#fff;
}
.container {padding:15px;max-width:480px;margin:auto;}
.header {display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.titleText {font-size:20px;font-weight:600;}
.subtitle {font-size:12px;opacity:0.6;}
.headerLogo {width:40px;height:40px;}

input, button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:16px;
}

input {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

button {
  background: linear-gradient(45deg,#22c55e,#16a34a);
  color:white;
  font-weight:bold;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

.innStatus {font-size:14px;margin-top:5px;}
.success {color:#22c55e;}
.error {color:#ef4444;}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div>
    <div class="titleText">Портал подачи заявок</div>
    <div class="subtitle">Быстро • Удобно • Онлайн</div>
  </div>
  <img src="icon-192.png" class="headerLogo">
</div>

<input type="tel" id="inn" placeholder="Введите ИНН" maxlength="9">
<div id="innStatus" class="innStatus"></div>

<div id="client"></div>

<input type="tel" id="income" placeholder="Введите доход">
<input type="month" id="month">

<button onclick="send()">🚀 Отправить</button>

<button id="installBtn" style="display:none;">📲 Установить приложение</button>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwUQ3EPlYjs2jqoEG4e4dDnXhb5AEbd5dLh9f_cWYsBVV8OFZMtn-kKn-KweiH3UfM1/exec";
let clientData = null;

inn.addEventListener("input",()=>{
  inn.value = inn.value.replace(/\D/g,'');
  if(inn.value.length===9) searchAuto(inn.value);
});

function searchAuto(val){
  fetch(API_URL+"?inn="+val)
  .then(r=>r.json())
  .then(data=>{
    if(data.found){
      clientData=data;
      innStatus.innerHTML="✅ Найден клиент";
      innStatus.className="innStatus success";

      client.innerHTML=`<div class="card">${data.fio}<br>${data.address}<br>${data.phone}</div>`;
    } else {
      innStatus.innerHTML="❌ Не найдено";
      innStatus.className="innStatus error";
      client.innerHTML="";
      clientData=null;
    }
  });
}

function send(){
  if(!clientData){alert("Введите ИНН");return;}
  if(!income.value){alert("Введите доход");return;}

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      inn:inn.value,
      income:income.value,
      month:month.value
    })
  })
  .then(()=>{
    alert("Успешно отправлено");
    inn.value="";
    income.value="";
    client.innerHTML="";
    clientData=null;
  });
}

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});
</script>

</body>
</html>
