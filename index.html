<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UZA App</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff;}
.container {padding:15px;}

input, button {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

input {background:#334155;color:white;}
button {background:#22c55e;color:white;font-weight:bold;}

.card {background:#1e293b;padding:15px;border-radius:15px;margin-top:10px;}

.loader {text-align:center;margin-top:10px;animation:fade 1s infinite alternate;}
@keyframes fade {from {opacity:0.4;} to {opacity:1;}}

#sendingOverlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);display:none;
justify-content:center;align-items:center;z-index:9999;
}

.spinner {
width:50px;height:50px;border:5px solid #334155;
border-top:5px solid #22c55e;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin {100% {transform:rotate(360deg);}}

#successPopup {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);display:none;
justify-content:center;align-items:center;z-index:9999;
}

.popupBox {
background:#22c55e;padding:25px;border-radius:15px;
text-align:center;font-size:18px;animation:pop 0.4s;
}

@keyframes pop {0%{transform:scale(0.5);}100%{transform:scale(1);}}
</style>
</head>

<body>

<div class="container">
<h2>Новая заявка</h2>

<input type="tel" id="inn" placeholder="Введите свой ИНН" maxlength="9">
<div id="searchLoader" class="loader" style="display:none;">🔍 Поиск...</div>
<div id="client"></div>

<input type="tel" id="income" placeholder="Введите доход">
<input type="month" id="month">

<button onclick="send()">🚀 Отправить</button>

</div>

<div id="sendingOverlay">
<div>
<div class="spinner"></div>
<div style="text-align:center;margin-top:10px;">Отправка...</div>
</div>
</div>

<div id="successPopup">
<div class="popupBox">
🎉<br><br>Ваша заявка успешно отправлена!
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRLdcuXx83MZ6um6lPZSaecyGKHg7l3Lh69Ry01mPXbOQWeAihZH5gMsF0LOguYX44/exec";

let clientData = null;

function vibrate(){
if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}
}

document.getElementById("inn").addEventListener("input", function(){
let inn=this.value;
if(inn.length===9){
searchAuto(inn);
}else{
client.innerHTML="";
}
});

function searchAuto(inn){
searchLoader.style.display="block";
client.innerHTML="";

fetch(API_URL+"?inn="+inn)
.then(res=>res.json())
.then(data=>{
searchLoader.style.display="none";

if(data.found){
clientData=data;
client.innerHTML=`<div class="card">
👤 ${data.fio}<br>
📍 ${data.address}<br>
📞 ${data.phone}
</div>`;
}else{
clientData=null;
client.innerHTML="<div style='color:red'>❌ Не найдено</div>";
}
});
}

function send(){

if(!clientData){
alert("Введите корректный ИНН");
return;
}

if(!income.value){
alert("Введите доход");
return;
}

if(!month.value){
alert("Выберите месяц");
return;
}

sendingOverlay.style.display="flex";

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
inn:inn.value,
income:income.value,
month:month.value,

fio:clientData.fio,
address:clientData.address,
phone:clientData.phone,

employee_fio: clientData.employee_fio,
employee_inn: clientData.employee_inn,
employee_sin: clientData.employee_sin,
employee_salary: clientData.employee_salary,
employee_date: clientData.employee_date
})
})
.then(res=>res.text())
.then(()=>{

sendingOverlay.style.display="none";

confetti({
particleCount:150,
spread:80,
origin:{y:0.6}
});

vibrate();

successPopup.style.display="flex";

setTimeout(()=>{
successPopup.style.display="none";
},2500);

inn.value="";
income.value="";
month.value="";
client.innerHTML="";
clientData=null;

})
.catch(()=>{
sendingOverlay.style.display="none";
alert("Ошибка отправки");
});
}

</script>

</body>
</html>
