<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UZA App</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  color: #fff;
  background:
    radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
    radial-gradient(circle at 80% 80%, #065f46, transparent),
    #0f172a;
}

/* SPLASH */
#splashScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.splash-logo {
  width: 80px;
  margin-bottom: 10px;
}

.loader {
  width: 40px;
  height: 40px;
  border: 4px solid #334155;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}
.logo {
  width: 40px;
}

/* INPUT */
input {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  margin-top: 12px;
  font-size: 18px;
  background: #1e293b;
  color: white;
  border: none;
  box-sizing: border-box;
}

/* SEARCH */
.searchSpinner {
  width: 28px;
  height: 28px;
  border: 3px solid #334155;
  border-top: 3px solid #22c55e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: auto;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  animation: fadeIn 0.3s ease;
  line-height: 1.6;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  margin-top: 15px;
  font-size: 18px;
  background: #22c55e;
  color: white;
  border: none;
}
button:disabled {
  background: #475569;
}

/* PROGRESS FORM */
.progressBox {
  height: 6px;
  background: #1e293b;
  margin: 10px;
}
#progressBar {
  height: 100%;
  width: 0%;
  background: #22c55e;
}

/* LANG */
.langSwitch {
  display: flex;
  background: #1e293b;
  border-radius: 20px;
  overflow: hidden;
  width: 120px;
  margin: 10px;
}
.langBtn {
  flex: 1;
  text-align: center;
  padding: 8px;
  cursor: pointer;
}
.langBtn.active {
  background: #22c55e;
}

/* SEND OVERLAY */
#sendingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.sendBox {
  text-align: center;
  width: 80%;
  max-width: 300px;
}
.progressLine {
  height: 8px;
  background: #334155;
  border-radius: 10px;
  margin-top: 10px;
}
#progressFill {
  height: 100%;
  width: 0;
  background: #22c55e;
}

.container {
  padding: 15px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splashScreen">
  <div style="text-align:center">
    <img src="logo.png" class="splash-logo">
    <h2 id="splashTitle"></h2>
    <div id="splashSub"></div>
    <div class="loader"></div>
  </div>
</div>

<div class="container">

  <div class="langSwitch">
    <div class="langBtn" data-lang="ru">RU</div>
    <div class="langBtn" data-lang="tj">TJ</div>
  </div>

  <div class="progressBox">
    <div id="progressBar"></div>
  </div>

  <div class="header">
    <div>
      <span id="title"></span><br>
      <small id="appVersion" style="color:#94a3b8;font-size:12px;">v1.0.0</small>
    </div>
    <img src="logo.png" class="logo">
  </div>

  <input id="inn" inputmode="numeric" maxlength="9">
  <div id="searchStatus"></div>
  <div id="client"></div>

  <input id="income" inputmode="numeric">

  <label id="monthLabel"></label>
  <input type="month" id="month">

  <button id="submitBtn" onclick="send()" disabled></button>

</div>

<!-- SEND -->
<div id="sendingOverlay">
  <div class="sendBox">
    <div id="progressText">0%</div>
    <div class="progressLine">
      <div id="progressFill"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyM6MZxtdVGSb-19EmFv-NEz2rxd1hkVKwcEEkAmQhOA-u3tcF05rHvPNPE2m7e3jYe/exec";

const translations = {
  ru: {
    title: "📝 Портал подачи заявок",
    inn: "Введите ИНН",
    income: "Введите доход",
    month: "Выберите месяц",
    send: "🚀 Отправить",
    splash: "Добро пожаловать",
    sub: "в Портал подачи заявок"
  },
  tj: {
    title: "📝 Портали дархостҳо",
    inn: "РМА-ро ворид кунед",
    income: "Даромадро ворид кунед",
    month: "Моҳро интихоб кунед",
    send: "🚀 Ирсол",
    splash: "Хуш омадед",
    sub: "ба портал"
  }
};

let clientData = null;

/* helpers */
function getEmployeeFio(data) {
  return data.employeeFio ||
         data.employee ||
         data.sotrudnik ||
         data.fio_sotrudnika ||
         data.sotrudnikFio ||
         data.employee_name ||
         data.manager ||
         data.sotrudnik_name ||
         "";
}

function escapeHtml(value) {
  if (value === null || value === undefined) return "";
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* язык */
function setLang(l) {
  const t = translations[l];
  title.innerText = t.title;
  inn.placeholder = t.inn;
  income.placeholder = t.income;
  monthLabel.innerText = "📅 " + t.month;
  submitBtn.innerText = t.send;
  splashTitle.innerText = t.splash;
  splashSub.innerText = t.sub;
  localStorage.setItem("lang", l);
}

const lang = localStorage.getItem("lang") || "ru";
setLang(lang);

document.querySelectorAll(".langBtn").forEach(btn => {
  if (btn.dataset.lang === lang) btn.classList.add("active");
  btn.onclick = () => {
    document.querySelectorAll(".langBtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    setLang(btn.dataset.lang);
  };
});

/* splash */
window.onload = () => {
  setTimeout(() => {
    splashScreen.style.display = "none";
  }, 1500);
};

/* предыдущий месяц */
const now = new Date();
const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
const year = prev.getFullYear();
const monthNum = String(prev.getMonth() + 1).padStart(2, "0");
month.value = `${year}-${monthNum}`;

/* validate */
function validate() {
  submitBtn.disabled = !(inn.value.length === 9 && income.value && month.value && clientData);
}

/* только цифры */
income.oninput = () => {
  income.value = income.value.replace(/\D/g, "");
  validate();
};

/* поиск по ИНН */
inn.oninput = () => {
  inn.value = inn.value.replace(/\D/g, "").slice(0, 9);

  clientData = null;
  client.innerHTML = "";
  searchStatus.innerHTML = "";
  validate();

  if (inn.value.length === 9) {
    searchStatus.innerHTML = '<div class="searchSpinner"></div>';

    fetch(API_URL + "?inn=" + encodeURIComponent(inn.value))
      .then(r => r.json())
      .then(d => {
        searchStatus.innerHTML = "";

        if (d && d.found) {
          const employeeFio = getEmployeeFio(d);

          clientData = {
            ...d,
            employeeFio: employeeFio
          };

          searchStatus.innerHTML = `
            <div style="color:#22c55e;font-weight:bold;">
              ✅ ИНН найден
            </div>
          `;

          client.innerHTML = `
            <div class="card">
              👤 <b>${escapeHtml(d.fio || "")}</b><br>
              📍 ${escapeHtml(d.address || "—")}<br>
              📞 ${escapeHtml(d.phone || "—")}
              ${employeeFio ? `<br>🧑‍💼 Сотрудник: <b>${escapeHtml(employeeFio)}</b>` : ""}
            </div>
          `;
        } else {
          clientData = null;
          searchStatus.innerHTML = `
            <div style="color:#ef4444;font-weight:bold;">
              ❌ ИНН не найден
            </div>
          `;
          client.innerHTML = "";
        }

        validate();
      })
      .catch(error => {
        console.log("GET error:", error);
        clientData = null;
        searchStatus.innerHTML = `
          <div style="color:#ef4444;font-weight:bold;">
            ❌ Ошибка поиска
          </div>
        `;
        client.innerHTML = "";
        validate();
      });
  }
};

/* прогресс отправки */
function startProgress() {
  let p = 0;
  return setInterval(() => {
    p += 10;
    if (p > 90) p = 90;
    progressFill.style.width = p + "%";
    progressText.innerText = p + "%";
  }, 300);
}

/* отправка */
function send() {
  if (!clientData) return;

  sendingOverlay.style.display = "flex";
  progressFill.style.width = "0%";
  progressText.innerText = "0%";

  let progress = startProgress();
  const employeeFio = clientData.employeeFio || getEmployeeFio(clientData);

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      inn: inn.value,
      income: income.value,
      month: month.value,
      fio: clientData.fio || "",
      employeeFio: employeeFio || "",
      employee: employeeFio || "",
      sotrudnik: employeeFio || "",
      fio_sotrudnika: employeeFio || ""
    })
  })
  .then(r => r.text())
  .then(res => {
    console.log("POST success:", res);

    clearInterval(progress);
    progressFill.style.width = "100%";
    progressText.innerText = "100%";

    setTimeout(() => {
      sendingOverlay.style.display = "none";
      confetti({ particleCount: 150, spread: 90 });

      inn.value = "";
      income.value = "";
      client.innerHTML = "";
      searchStatus.innerHTML = "";
      clientData = null;
      validate();
    }, 500);
  })
  .catch(error => {
    console.log("POST error:", error);
    clearInterval(progress);
    sendingOverlay.style.display = "none";
    alert("Ошибка отправки");
  });
}
</script>

</body>
</html>
