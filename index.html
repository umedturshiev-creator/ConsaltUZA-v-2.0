<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<title>UZA App</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.container {
  padding:15px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

input, button {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

input {
  background:#334155;
  color:white;
}

button {
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.loader {
  margin-top:10px;
  text-align:center;
  animation:fade 1s infinite alternate;
}

@keyframes fade {
  from {opacity:0.4;}
  to {opacity:1;}
}

#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.logo {
  font-size:40px;
  font-weight:bold;
  background:linear-gradient(45deg,#22c55e,#3b82f6);
  -webkit-background-clip:text;
  color:transparent;
}

.spin {
  width:40px;
  height:40px;
  border:4px solid #334155;
  border-top:4px solid #22c55e;
  border-radius:50%;
  margin-top:20px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% {transform:rotate(360deg);}
}

button:active {
  transform:scale(0.95);
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">UZA</div>
  <div class="spin"></div>
</div>

<div class="container">

<h2>📝 Новая заявка</h2>

<input type="tel" id="inn" placeholder="Введите свой ИНН" maxlength="9">

<div id="searchLoader" class="loader" style="display:none;">
🔍 Поиск данных...
</div>

<div id="client"></div>

<input type="tel" id="income" placeholder="Введите свой месячный доход">

<input type="month" id="month">

<button onclick="send()">🚀 Отправить заявку</button>

<div id="status"></div>

</div>

<!-- SOUND -->
<audio id="successSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5b6a2b3.mp3"></audio>
<audio id="errorSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3d8f6b0a5d.mp3"></audio>
<audio id="searchSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c1d9a6c2c.mp3"></audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzpRbYQfaX7zf46tj6KDdyaGxWc_VjRjrXeEg4zNr1KXIjZPP1ODZoyHdO7oe9x_xD5/exec";

let clientData = null;

// вибрация
function vibrate(type){
  if(!navigator.vibrate) return;

  if(type==="success") navigator.vibrate([100,50,100]);
  if(type==="error") navigator.vibrate([300]);
  if(type==="search") navigator.vibrate([50]);
}

// автопоиск
document.getElementById("inn").addEventListener("input", function(){

  let inn = this.value;

  if(inn.length === 9){
    searchAuto(inn);
  }
});

// поиск
function searchAuto(inn){

  searchLoader.style.display = "block";
  client.innerHTML = "";

  searchSound.play();
  vibrate("search");

  fetch(API_URL + "?inn=" + inn)
  .then(res=>res.json())
  .then(data=>{

    searchLoader.style.display = "none";

    if(data.found){

      clientData = data;

      successSound.play();
      vibrate("success");

      client.innerHTML = `
        <div class="card">
        👤 ${data.fio}<br>
        📍 ${data.address}<br>
        📞 ${data.phone}<br><br>

        👨‍💼 ${data.employee_fio}<br>
        💰 ${data.employee_salary}
        </div>`;
    } else {
      errorSound.play();
      vibrate("error");
      client.innerHTML = "<div style='color:red'>❌ Клиент не найден</div>";
    }
  });
}

// отправка
function send(){

  if(!clientData){
    errorSound.play();
    vibrate("error");
    alert("Введите корректный ИНН");
    return;
  }

  status.innerHTML = "⏳ Отправка данных...";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      inn:inn.value,
      income:income.value,
      fio:clientData.fio,
      address:clientData.address,
      phone:clientData.phone,

      employee_fio: clientData.employee_fio,
      employee_inn: clientData.employee_inn,
      employee_sin: clientData.employee_sin,
      employee_salary: clientData.employee_salary,
      employee_date: clientData.employee_date
    })
  })
  .then(res=>{
    if(res.ok){

      successSound.play();
      vibrate("success");

      status.innerHTML = "✅ Заявка успешно отправлена";

      inn.value = "";
      income.value = "";
      client.innerHTML = "";

    } else {
      errorSound.play();
      vibrate("error");
      status.innerHTML = "❌ Ошибка отправки";
    }
  })
  .catch(()=>{
    errorSound.play();
    vibrate("error");
    status.innerHTML = "❌ Ошибка сети";
  });
}

// splash
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("splash").style.display = "none";
  }, 2000);
};

// service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
