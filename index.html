<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>UZA App</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff;}
.container {padding:15px;max-width:480px;margin:auto;}

input, button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:16px;
}

input {background:#334155;color:white;}
button {background:#22c55e;color:white;font-weight:bold;}

.card {background:#1e293b;padding:15px;border-radius:15px;margin-top:10px;}

.loader {text-align:center;margin-top:10px;}

#sendingOverlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);display:none;
justify-content:center;align-items:center;z-index:9999;
}

.spinner {
width:50px;height:50px;border:5px solid #334155;
border-top:5px solid #22c55e;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin {100%{transform:rotate(360deg);}}

#successPopup {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);display:none;
justify-content:center;align-items:center;
}

.popupBox {
background:#22c55e;padding:20px;border-radius:15px;
text-align:center;font-size:16px;
}

#appVersion {
position:fixed;top:8px;right:12px;font-size:11px;opacity:0.5;
}
</style>

</head>

<body>

<div id="appVersion">v1.2</div>

<div class="container">

<h2>📝 Новая заявка</h2>

<input type="tel" id="inn" placeholder="Введите свой ИНН" maxlength="9" inputmode="numeric">

<div id="searchLoader" class="loader" style="display:none;">🔍 Поиск...</div>
<div id="client"></div>

<input type="tel" id="income" placeholder="Введите доход" inputmode="numeric">

<label style="margin-top:10px;display:block;">📅 Выберите месяц</label>
<input type="month" id="month">

<button onclick="send()">🚀 Отправить</button>

</div>

<div id="sendingOverlay">
<div>
<div class="spinner"></div>
<div style="margin-top:10px;text-align:center;">Отправка...</div>
</div>
</div>

<div id="successPopup">
<div class="popupBox">
🎉<br><br>Ваша заявка успешно отправлена!
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby1HOova0eIURZoWy0ZgUp0oxca-UvsPuycy3VL3IlZAZqIjEo5z1Pcq13jrcwY2FYK/exec";

let clientData = null;

// ===== настройка месяца =====
function setupMonth(){

  const m = document.getElementById("month");
  const now = new Date();

  // максимум = текущий месяц
  const max = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,'0');
  m.max = max;

  // прошлый месяц
  const prev = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const val = prev.getFullYear() + "-" + String(prev.getMonth()+1).padStart(2,'0');

  m.value = val;

}

// запуск
document.addEventListener("DOMContentLoaded", setupMonth);

// автопоиск
inn.addEventListener("input", function(){
  if(this.value.length === 9){
    searchAuto(this.value);
  } else {
    client.innerHTML="";
  }
});

function searchAuto(val){

  searchLoader.style.display="block";
  client.innerHTML="";

  fetch(API_URL + "?inn=" + val)
  .then(r=>r.json())
  .then(data=>{

    searchLoader.style.display="none";

    if(data.found){
      clientData=data;

      client.innerHTML=`
      <div class="card">
      👤 ${data.fio}<br>
      📍 ${data.address}<br>
      📞 ${data.phone}
      </div>`;
    } else {
      clientData=null;
      client.innerHTML="<div style='color:red'>❌ Не найдено</div>";
    }

  });
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }
}

function send(){

  if(!clientData){alert("Введите ИНН");return;}
  if(!income.value){alert("Введите доход");return;}
  if(!month.value){alert("Выберите месяц");return;}

  sendingOverlay.style.display="flex";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      inn:inn.value,
      income:income.value,
      month:month.value,

      fio:clientData.fio,
      address:clientData.address,
      phone:clientData.phone,

      employee_fio: clientData.employee_fio,
      employee_inn: clientData.employee_inn,
      employee_sin: clientData.employee_sin,
      employee_salary: clientData.employee_salary,
      employee_date: clientData.employee_date
    })
  })
  .then(r=>r.text())
  .then(()=>{

    sendingOverlay.style.display="none";

    confetti({particleCount:120,spread:70});
    vibrate();

    successPopup.style.display="flex";

    setTimeout(()=>{
      successPopup.style.display="none";
    },2500);

    inn.value="";
    income.value="";
    client.innerHTML="";
    clientData=null;

  })
  .catch(()=>{
    sendingOverlay.style.display="none";
    alert("Ошибка");
  });

}

</script>

</body>
</html>
